<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ternssh</title>
    <script>
      (function () {
        var stored = localStorage.getItem("ternssh-theme");
        var mode =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var resolved =
          mode === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;

        var siteName = localStorage.getItem("ternssh-site-name");
        if (siteName && siteName.trim()) {
          document.title = siteName.trim().slice(0, 64);
        }

        var opacity = localStorage.getItem("ternssh-widget-opacity");
        if (opacity) {
          var parsed = parseInt(opacity, 10);
          if (!isNaN(parsed) && parsed >= 30 && parsed <= 100) {
            document.documentElement.style.setProperty(
              "--widget-opacity",
              String(parsed / 100),
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
